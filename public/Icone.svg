<svg width="400" height="150" viewBox="0 0 400 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente Principal Mais Vibrante -->
    <linearGradient id="premium_gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" /> <!-- Emerald 400 -->
      <stop offset="50%" stop-color="#10B981" /> <!-- Emerald 500 -->
      <stop offset="100%" stop-color="#059669" /> <!-- Emerald 600 -->
    </linearGradient>

    <!-- Filtro de Brilho (Glow) -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Ícone com Efeito de Brilho -->
  <g filter="url(#glow)" transform="translate(25, 35)">
    <!-- Barras Progressivas com Cantos Suaves -->
    <rect x="0" y="48" width="18" height="32" rx="5" fill="url(#premium_gradient)" opacity="0.3" />
    <rect x="28" y="28" width="18" height="52" rx="5" fill="url(#premium_gradient)" opacity="0.6" />
    <rect x="56" y="0" width="18" height="80" rx="5" fill="url(#premium_gradient)" />

    <!-- Seta de Lançamento (Curva Suave) -->
    <path d="M2 42C30 35 60 15 85 2M85 2H62M85 2V25"
          stroke="url(#premium_gradient)"
          stroke-width="8"
          stroke-linecap="round"
          stroke-linejoin="round" />
    </g>

    <!-- Tipografia ZENIT (Forte e Moderna) -->
    <text x="145" y="82"
          font-family="Inter, -apple-system, sans-serif"
          font-weight="900"
          font-size="62"
          fill="url(#premium_gradient)"
          style="filter: drop-shadow(0px 4px 8px rgba(16, 185, 129, 0.2));"
          letter-spacing="-3">
      ZENIT
    </text>

    <!-- Tipografia FINANCE (Espaçamento de Luxo) -->
    <text x="148" y="120"
          font-family="Inter, -apple-system, sans-serif"
          font-weight="400"
          font-size="22"
          fill="#64748B"
          letter-spacing="14">
      FINANCE
    </text>
  </svg>
